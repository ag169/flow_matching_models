amp:
  enabled: true
dataset:
  name: cifar10
  train:
    batchsize: 64
    imgsize: 32
    n_workers: 8
  val:
    batchsize: 32
    imgsize: 32
    n_workers: 4
fid:
  batch_size: 32
  cfg_scale: 1.0
  num_samples: 10000
grad_clip_norm: 5.0
lr: 0.0002
model:
  arch: m000_unet
  params:
    channels:
    - 64
    - 256
    - 512
    embed_dim: 256
    num_blocks_per_stage: 2
    num_bottleneck_resblocks: 2
scheduler: cosine
train_iters: 300000
training:
  cfg_dropout_prob: 0.15
  ema_decay: 0.999
  log_freq: 1000
  tb_log_freq: 50
validation:
  log_sample_num_imgs: 10
  sample_cfg_scale: 2.0
  sample_num_steps: 20
  val_iters: 5000
warmup_iters: 2000
weight_decay: 1.0e-06
